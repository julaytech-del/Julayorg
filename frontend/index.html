    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Julay",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web, iOS, Android",
      "description": "AI-powered project management platform. Plan smarter, work faster, deliver on time.",
      "url": "https://julay.org",
      "offers": [
        { "@type": "Offer", "price": "0", "priceCurrency": "USD", "name": "Free Plan" },
        { "@type": "Offer", "price": "9", "priceCurrency": "USD", "name": "Starter Plan" },
        { "@type": "Offer", "price": "29", "priceCurrency": "USD", "name": "Professional Plan" },
        { "@type": "Offer", "price": "79", "priceCurrency": "USD", "name": "Business Plan" }
      ],
      "featureList": [
        "AI Project Generation",
        "Kanban Board",
        "Gantt Chart",
        "Sprint Board",
        "Team Workload View",
        "Automations",
        "Custom Dashboards",
        "Time Tracking",
        "Multi-language Support"
      ]
    }
    </script>

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Julay",
      "url": "https://julay.org",
      "logo": "https://julay.org/logo.png",
      "sameAs": [
        "https://twitter.com/julay_app",
        "https://linkedin.com/company/julay",
        "https://github.com/julaytech-del"
      ],
      "contactPoint": [
        {
          "@type": "ContactPoint",
          "email": "hello@julay.org",
          "contactType": "customer support"
        }
      ]
    }
    </script>

    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is Julay free to use?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. Julay has a free plan with up to 3 projects and 5 team members. No credit card required." }
        },
        {
          "@type": "Question",
          "name": "How does the AI project generation work?",
          "acceptedAnswer": { "@type": "Answer", "text": "You describe your goal in plain language. Julay's AI creates a full project with tasks, milestones, priorities, and suggested assignments in seconds." }
        },
        {
          "@type": "Question",
          "name": "Is my data used to train AI models?",
          "acceptedAnswer": { "@type": "Answer", "text": "No. Your project data and inputs are never used to train AI models. See our Privacy Policy for full details." }
        },
        {
          "@type": "Question",
          "name": "Can I cancel my subscription at any time?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. You can cancel anytime from your account settings. Your plan remains active until the end of the billing period." }
        },
        {
          "@type": "Question",
          "name": "Does Julay offer a mobile app?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. Julay is available as a Progressive Web App (PWA) and native iOS/Android apps are in development." }
        }
      ]
    }
    </script>

  <body>
    <noscript>
      <style>
        .ns-wrap { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; max-width: 900px; margin: 0 auto; padding: 40px 20px; color: #1E293B; }
        .ns-hero { text-align: center; padding: 80px 0 60px; }
        .ns-hero h1 { font-size: 2.5rem; font-weight: 800; color: #1E293B; margin-bottom: 16px; }
        .ns-hero p { font-size: 1.1rem; color: #64748B; margin-bottom: 32px; }
        .ns-btn { display: inline-block; background: #6366F1; color: #fff; padding: 14px 32px; border-radius: 10px; text-decoration: none; font-weight: 600; }
        .ns-features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin: 40px 0; }
        .ns-feature { padding: 24px; border: 1px solid #E2E8F0; border-radius: 12px; }
        .ns-feature h3 { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
        .ns-feature p { font-size: 0.875rem; color: #64748B; }
        @media(max-width:600px){ .ns-features{ grid-template-columns: 1fr; } .ns-hero h1{ font-size:1.8rem; } }
      </style>
      <div class="ns-wrap">
        <div class="ns-hero">
          <h1>Julay — AI Work Operating System</h1>
          <p>We don't manage tasks. We design execution systems. AI-powered project management for modern teams.</p>
          <a href="/register" class="ns-btn">Start Free — No Credit Card</a>
        </div>
        <div class="ns-features">
          <div class="ns-feature"><h3>AI Project Generation</h3><p>Describe your goal, AI creates a full project with tasks, milestones, and assignments in seconds.</p></div>
          <div class="ns-feature"><h3>Kanban + Gantt + Sprints</h3><p>Every view your team needs — boards, timelines, sprint boards, workload charts.</p></div>
          <div class="ns-feature"><h3>Automations &amp; Webhooks</h3><p>Set rules that work while you sleep. Auto-assign, notify, and update without manual effort.</p></div>
          <div class="ns-feature"><h3>Team Workload</h3><p>See who is overloaded and who has capacity. Balance work across your entire team visually.</p></div>
          <div class="ns-feature"><h3>Custom Dashboards</h3><p>Build your command center with drag-and-drop widgets — charts, KPIs, recent tasks.</p></div>
          <div class="ns-feature"><h3>Free to Start</h3><p>Full-featured free plan. Upgrade when your team grows. No contracts, cancel anytime.</p></div>
        </div>
        <p style="text-align:center;margin-top:40px;color:#64748B;font-size:0.875rem;">
          <a href="/privacy">Privacy Policy</a> · <a href="/terms">Terms of Service</a> · <a href="/contact">Contact</a>
        </p>
      </div>
    </noscript>
