<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Julay — AI Work Operating System</title>
    <meta name="description" content="Julay — AI-powered project management. Plan smarter, work faster, deliver on time." />
    <meta name="keywords" content="project management, AI, team collaboration, task management, Kanban, Gantt chart" />
    <meta name="author" content="Julay" />
    <meta property="og:title" content="Julay — AI Work Operating System" />
    <meta property="og:description" content="The smartest project management platform. AI plans your projects, tracks progress, and keeps your team aligned." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://julay.org" />
    <meta property="og:image" content="https://julay.org/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Julay — AI Work Operating System" />
    <meta name="twitter:description" content="AI-powered project management for modern teams" />
    <meta name="twitter:image" content="https://julay.org/og-image.png" />
    <meta name="theme-color" content="#6366F1" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Julay",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web, iOS, Android",
      "description": "AI-powered project management platform. Plan smarter, work faster, deliver on time.",
      "url": "https://julay.org",
      "offers": [
        { "@type": "Offer", "price": "0", "priceCurrency": "USD", "name": "Free Plan" },
        { "@type": "Offer", "price": "9", "priceCurrency": "USD", "name": "Starter Plan" },
        { "@type": "Offer", "price": "29", "priceCurrency": "USD", "name": "Professional Plan" },
        { "@type": "Offer", "price": "79", "priceCurrency": "USD", "name": "Business Plan" }
      ],
      "featureList": [
        "AI Project Generation",
        "Kanban Board",
        "Gantt Chart",
        "Sprint Board",
        "Team Workload View",
        "Automations",
        "Custom Dashboards",
        "Time Tracking",
        "Multi-language Support"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root">
      <noscript>
        <style>
          .ns-wrap { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; max-width: 900px; margin: 0 auto; padding: 40px 20px; color: #1E293B; }
          .ns-hero { text-align: center; padding: 80px 0 60px; }
          .ns-hero h1 { font-size: 2.5rem; font-weight: 800; color: #1E293B; margin-bottom: 16px; }
          .ns-hero p { font-size: 1.1rem; color: #64748B; margin-bottom: 32px; }
          .ns-btn { display: inline-block; background: #6366F1; color: #fff; padding: 14px 32px; border-radius: 10px; text-decoration: none; font-weight: 600; }
          .ns-features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin: 40px 0; }
          .ns-feature { padding: 24px; border: 1px solid #E2E8F0; border-radius: 12px; }
          .ns-feature h3 { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
          .ns-feature p { font-size: 0.875rem; color: #64748B; }
          @media(max-width:600px){ .ns-features{ grid-template-columns: 1fr; } .ns-hero h1{ font-size:1.8rem; } }
        </style>
        <div class="ns-wrap">
          <div class="ns-hero">
            <h1>Julay — AI Work Operating System</h1>
            <p>We don't manage tasks. We build execution systems. AI-powered project management for modern teams.</p>
            <a href="/register" class="ns-btn">Start Free — No Credit Card</a>
          </div>
          <div class="ns-features">
            <div class="ns-feature"><h3>AI Project Generation</h3><p>Describe your goal, AI creates a full project with tasks, milestones, and assignments in seconds.</p></div>
            <div class="ns-feature"><h3>Kanban + Gantt + Sprints</h3><p>Every view your team needs — boards, timelines, sprint boards, workload charts.</p></div>
            <div class="ns-feature"><h3>Automations & Webhooks</h3><p>Set rules that work while you sleep. Auto-assign, notify, and update without manual effort.</p></div>
            <div class="ns-feature"><h3>Team Workload</h3><p>See who is overloaded and who has capacity. Balance work across your entire team visually.</p></div>
            <div class="ns-feature"><h3>Custom Dashboards</h3><p>Build your command center with drag-and-drop widgets — charts, KPIs, recent tasks.</p></div>
            <div class="ns-feature"><h3>Free to Start</h3><p>Full-featured free plan. Upgrade when your team grows. No contracts, cancel anytime.</p></div>
          </div>
        </div>
      </noscript>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
