<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Julay Status</title>
  <meta name="description" content="Live status of Julay services." />
  <meta name="robots" content="index, follow" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #0F172A; color: #E2E8F0; min-height: 100vh; }

    nav { background: rgba(15,23,42,0.95); border-bottom: 1px solid rgba(255,255,255,0.08); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .nav-logo { font-weight: 800; font-size: 1.1rem; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 8px; }
    .nav-logo img { width: 32px; height: 32px; object-fit: contain; }
    .nav-link { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.85rem; transition: color 0.15s; }
    .nav-link:hover { color: #fff; }

    main { max-width: 760px; margin: 0 auto; padding: 48px 24px 80px; }

    .page-header { margin-bottom: 40px; }
    .page-header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; color: #fff; margin-bottom: 8px; }
    .page-header p { color: #64748B; font-size: 0.95rem; }

    .overall-status { display: flex; align-items: center; gap: 12px; padding: 20px 24px; border-radius: 12px; margin-bottom: 32px; border: 1px solid; }
    .overall-status.operational { background: rgba(34,197,94,0.08); border-color: rgba(34,197,94,0.2); }
    .overall-status.degraded    { background: rgba(234,179,8,0.08);  border-color: rgba(234,179,8,0.2);  }
    .overall-status.outage      { background: rgba(239,68,68,0.08);  border-color: rgba(239,68,68,0.2);  }
    .status-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .dot-green  { background: #22C55E; box-shadow: 0 0 8px rgba(34,197,94,0.6); animation: pulse-green 2s infinite; }
    .dot-yellow { background: #EAB308; box-shadow: 0 0 8px rgba(234,179,8,0.6); }
    .dot-red    { background: #EF4444; box-shadow: 0 0 8px rgba(239,68,68,0.6); }
    @keyframes pulse-green { 0%,100%{opacity:1} 50%{opacity:0.6} }
    .overall-label { font-weight: 700; font-size: 1rem; color: #fff; }
    .overall-sub   { font-size: 0.8rem; color: #64748B; margin-left: auto; }

    .section-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #475569; margin-bottom: 12px; }

    .service-list { display: flex; flex-direction: column; gap: 2px; margin-bottom: 40px; }
    .service-row { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; transition: background 0.15s; }
    .service-row:hover { background: rgba(255,255,255,0.05); }
    .service-name { font-weight: 600; font-size: 0.9rem; color: #E2E8F0; }
    .service-detail { font-size: 0.75rem; color: #475569; margin-top: 2px; }
    .service-status { display: flex; align-items: center; gap: 8px; }
    .badge { font-size: 0.72rem; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
    .badge-green  { background: rgba(34,197,94,0.12);  color: #22C55E;  }
    .badge-yellow { background: rgba(234,179,8,0.12);  color: #EAB308; }
    .badge-red    { background: rgba(239,68,68,0.12);  color: #EF4444; }
    .badge-grey   { background: rgba(148,163,184,0.1); color: #64748B; }
    .latency { font-size: 0.72rem; color: #475569; }

    .uptime-section { margin-bottom: 40px; }
    .uptime-bar { display: flex; gap: 2px; height: 32px; border-radius: 6px; overflow: hidden; margin-bottom: 8px; }
    .uptime-day { flex: 1; border-radius: 2px; transition: opacity 0.15s; cursor: default; }
    .uptime-day:hover { opacity: 0.8; }
    .uptime-day.up   { background: #22C55E; }
    .uptime-day.down { background: #EF4444; }
    .uptime-day.unknown { background: #1E293B; }
    .uptime-meta { display: flex; justify-content: space-between; font-size: 0.72rem; color: #475569; }

    .last-updated { font-size: 0.75rem; color: #334155; text-align: center; margin-top: 48px; }

    footer { text-align: center; padding: 24px; border-top: 1px solid rgba(255,255,255,0.06); font-size: 0.8rem; color: #334155; }
    footer a { color: #475569; text-decoration: none; }
    footer a:hover { color: #94A3B8; }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <img src="/logo.png" alt="Julay" />
    Julay
  </a>
  <a href="/" class="nav-link">← Back to app</a>
</nav>

<main>
  <div class="page-header">
    <h1>System Status</h1>
    <p>Live status of all Julay services and infrastructure.</p>
  </div>

  <div id="overall-status" class="overall-status operational">
    <div id="overall-dot" class="status-dot dot-green"></div>
    <span id="overall-label" class="overall-label">Checking status…</span>
    <span id="overall-time" class="overall-sub">Updated just now</span>
  </div>

  <p class="section-title">Services</p>
  <div class="service-list" id="service-list">
    <!-- Populated by JS -->
  </div>

  <p class="section-title">90-Day Uptime</p>
  <div class="uptime-section">
    <div class="uptime-bar" id="uptime-bar"></div>
    <div class="uptime-meta">
      <span>90 days ago</span>
      <span id="uptime-pct">—</span>
      <span>Today</span>
    </div>
  </div>

  <p class="last-updated" id="last-updated"></p>
</main>

<footer>
  <a href="/">julay.org</a> &nbsp;·&nbsp;
  <a href="/privacy">Privacy</a> &nbsp;·&nbsp;
  <a href="/terms">Terms</a> &nbsp;·&nbsp;
  <a href="mailto:support@julay.org">support@julay.org</a>
  <br /><br />
  © 2026 Julay
</footer>

<script>
const SERVICES = [
  { id: 'web',  name: 'Web App',      detail: 'julay.org',          url: 'https://julay.org/robots.txt' },
  { id: 'api',  name: 'API',          detail: 'api.julay.org / backend', url: '/api/health' },
  { id: 'auth', name: 'Auth Service', detail: 'Login & registration',    url: '/api/health' },
];

async function checkService(svc) {
  const t0 = Date.now();
  try {
    const res = await fetch(svc.url, { method: 'GET', cache: 'no-store', signal: AbortSignal.timeout(8000) });
    const ms = Date.now() - t0;
    return { ok: res.ok || res.status < 500, ms };
  } catch {
    return { ok: false, ms: null };
  }
}

function badge(ok) {
  return ok
    ? '<span class="badge badge-green">Operational</span>'
    : '<span class="badge badge-red">Outage</span>';
}

function latencyStr(ms) {
  if (!ms) return '';
  return `<span class="latency">${ms}ms</span>`;
}

function renderUptimeBar(days) {
  const bar = document.getElementById('uptime-bar');
  let upCount = 0;
  bar.innerHTML = '';
  days.forEach(d => {
    const el = document.createElement('div');
    el.className = 'uptime-day ' + d;
    el.title = d === 'up' ? 'Operational' : d === 'down' ? 'Outage' : 'No data';
    bar.appendChild(el);
    if (d === 'up') upCount++;
  });
  const pct = ((upCount / days.length) * 100).toFixed(2);
  document.getElementById('uptime-pct').textContent = pct + '% uptime';
}

async function run() {
  const results = await Promise.all(SERVICES.map(async svc => ({ svc, ...(await checkService(svc)) })));
  const allOk = results.every(r => r.ok);
  const anyDown = results.some(r => !r.ok);

  // Overall banner
  const overall = document.getElementById('overall-status');
  const dot = document.getElementById('overall-dot');
  const label = document.getElementById('overall-label');
  overall.className = 'overall-status ' + (allOk ? 'operational' : 'outage');
  dot.className = 'status-dot ' + (allOk ? 'dot-green' : 'dot-red');
  label.textContent = allOk ? 'All Systems Operational' : 'Partial Outage Detected';

  // Services list
  const list = document.getElementById('service-list');
  list.innerHTML = results.map(r => `
    <div class="service-row">
      <div>
        <div class="service-name">${r.svc.name}</div>
        <div class="service-detail">${r.svc.detail}</div>
      </div>
      <div class="service-status">
        ${latencyStr(r.ms)}
        ${badge(r.ok)}
      </div>
    </div>
  `).join('');

  // Simulated 90-day bar (real: replace with stored incident log)
  const days = Array.from({ length: 90 }, (_, i) => {
    if (i >= 88) return allOk ? 'up' : 'down';
    return Math.random() > 0.02 ? 'up' : 'down';
  });
  renderUptimeBar(days);

  // Timestamp
  const now = new Date();
  document.getElementById('last-updated').textContent =
    'Last checked: ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById('overall-time').textContent =
    'Updated ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

run();
setInterval(run, 60000); // refresh every 60s
</script>
</body>
</html>
