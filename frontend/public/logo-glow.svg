<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 36" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="55%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="50%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon -->
  <path d="M18 5 Q31 5 31 18" stroke="url(#g)" stroke-width="1.4" fill="none" opacity="0.6"/>
  <path d="M31 18 Q31 31 18 31" stroke="url(#g)" stroke-width="1.4" fill="none" opacity="0.6"/>
  <path d="M18 31 Q5 31 5 18" stroke="url(#g)" stroke-width="1.4" fill="none" opacity="0.6"/>
  <path d="M5 18 Q5 5 18 5" stroke="url(#g)" stroke-width="1.4" fill="none" opacity="0.6"/>
  <line x1="18" y1="5" x2="18" y2="31" stroke="url(#g)" stroke-width="0.6" opacity="0.25"/>
  <line x1="5" y1="18" x2="31" y2="18" stroke="url(#g)" stroke-width="0.6" opacity="0.25"/>
  <circle cx="18" cy="5"  r="2.5" fill="url(#g)"/>
  <circle cx="31" cy="18" r="2.5" fill="url(#g)"/>
  <circle cx="18" cy="31" r="2.5" fill="url(#g)"/>
  <circle cx="5"  cy="18" r="2.5" fill="url(#g)"/>
  <circle cx="18" cy="18" r="5" fill="url(#g)" filter="url(#glow)"/>

  <!-- Wordmark with gradient + glow -->
  <text
    x="46" y="24.5"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif"
    font-weight="700" font-size="21" letter-spacing="-0.8"
    fill="url(#wg)" filter="url(#textGlow)"
  >Julay</text>
</svg>
