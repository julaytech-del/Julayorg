name: Deploy to julay.org

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_GOOGLE_CLIENT_ID: 722079093063-prb89vbbksnhhrgsi1q785atmgs6hhac.apps.googleusercontent.com
          VITE_PLAUSIBLE_DOMAIN: julay.org
          VITE_SENTRY_DSN: https://f89dc5462cfea4330b27e4357384cbdb@o4511212808175616.ingest.us.sentry.io/4511212814401536
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy backend and detect nginx root
        run: |
          NGINX_ROOT=$(ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd /home/ubuntu/Julayorg &&
            git fetch origin main &&
            git reset --hard origin/main &&
            git clean -fd &&
            touch /home/ubuntu/Julayorg/backend/.env
            grep -q '^GOOGLE_CLIENT_SECRET=' /home/ubuntu/Julayorg/backend/.env && sed -i 's|^GOOGLE_CLIENT_SECRET=.*|GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}|' /home/ubuntu/Julayorg/backend/.env || echo 'GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}' >> /home/ubuntu/Julayorg/backend/.env
            grep -q '^JWT_SECRET=' /home/ubuntu/Julayorg/backend/.env && sed -i 's|^JWT_SECRET=.*|JWT_SECRET=${{ secrets.JWT_SECRET }}|' /home/ubuntu/Julayorg/backend/.env || echo 'JWT_SECRET=${{ secrets.JWT_SECRET }}' >> /home/ubuntu/Julayorg/backend/.env
            cd backend &&
            npm install --production &&
            pm2 restart julay-backend --update-env 2>/dev/null || pm2 start /home/ubuntu/Julayorg/backend/src/app.js --name julay-backend --cwd /home/ubuntu/Julayorg/backend -f
            echo 'NGINX_ROOT_START'
            sudo nginx -T 2>/dev/null | grep -E '^\s*root ' | head -5 || cat /etc/nginx/sites-enabled/julay.org 2>/dev/null | grep -E '^\s*root ' | head -5
            echo 'NGINX_ROOT_END'
          ")
          echo "$NGINX_ROOT"
          DETECTED=$(echo "$NGINX_ROOT" | grep -A1 'NGINX_ROOT_START' | grep 'root' | awk '{print $2}' | tr -d ';' | head -1)
          echo "Detected nginx root: $DETECTED"
          echo "NGINX_ROOT_PATH=$DETECTED" >> $GITHUB_ENV

      - name: Sync frontend files
        run: |
          TARGET="/var/www/julay/frontend/dist/"
          if [ -n "$NGINX_ROOT_PATH" ] && [ "$NGINX_ROOT_PATH" != "/var/www/julay/frontend/dist" ]; then
            TARGET="$NGINX_ROOT_PATH/"
            echo "Using detected nginx root: $TARGET"
          fi
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" \
            frontend/dist/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:$TARGET

      - name: Apply nginx config and fix CSP
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            sudo cp /home/ubuntu/Julayorg/nginx.conf /etc/nginx/sites-available/julay.org &&
            sudo nginx -t && sudo systemctl reload nginx &&
            echo 'Nginx reloaded successfully'
          " || echo 'WARNING: Nginx config not applied - run manually on server'
