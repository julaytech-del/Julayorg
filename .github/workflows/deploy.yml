name: Deploy to julay.org

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 34.227.78.81
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: /home/ubuntu/deploy.sh
