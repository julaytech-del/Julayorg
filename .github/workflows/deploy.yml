name: Deploy to julay.org

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_GOOGLE_CLIENT_ID: 722079093063-prb89vbbksnhhrgsi1q785atmgs6hhac.apps.googleusercontent.com
          VITE_PLAUSIBLE_DOMAIN: julay.org
          VITE_SENTRY_DSN: https://f89dc5462cfea4330b27e4357384cbdb@o4511212808175616.ingest.us.sentry.io/4511212814401536
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Free disk space & update server code
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} bash << 'ENDSSH'
            echo "=== Disk before cleanup ==="
            df -h /

            echo "=== Freeing space: removing frontend node_modules ==="
            rm -rf /home/ubuntu/Julayorg/frontend/node_modules
            rm -rf /home/ubuntu/Julayorg/frontend/.vite

            echo "=== Disk after cleanup ==="
            df -h /

            echo "=== Pulling latest code ==="
            cd /home/ubuntu/Julayorg
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "=== Prepare nginx dist dir ==="
            sudo mkdir -p /var/www/julay/frontend/dist
            sudo chown -R ubuntu:ubuntu /var/www/julay

            echo "=== Install & restart backend ==="
            cd backend
            npm install --production
            pm2 delete julay-backend 2>/dev/null || true
            pm2 start /home/ubuntu/Julayorg/backend/server.js --name julay-backend --cwd /home/ubuntu/Julayorg/backend
          ENDSSH

      - name: Inject secrets into .env
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} bash << ENDSSH
            touch /home/ubuntu/Julayorg/backend/.env
            grep -q '^GOOGLE_CLIENT_SECRET=' /home/ubuntu/Julayorg/backend/.env \
              && sed -i 's|^GOOGLE_CLIENT_SECRET=.*|GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}|' /home/ubuntu/Julayorg/backend/.env \
              || echo 'GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}' >> /home/ubuntu/Julayorg/backend/.env
            grep -q '^JWT_SECRET=' /home/ubuntu/Julayorg/backend/.env \
              && sed -i 's|^JWT_SECRET=.*|JWT_SECRET=${{ secrets.JWT_SECRET }}|' /home/ubuntu/Julayorg/backend/.env \
              || echo 'JWT_SECRET=${{ secrets.JWT_SECRET }}' >> /home/ubuntu/Julayorg/backend/.env
            grep -q '^STRIPE_SECRET_KEY=' /home/ubuntu/Julayorg/backend/.env \
              && sed -i 's|^STRIPE_SECRET_KEY=.*|STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}|' /home/ubuntu/Julayorg/backend/.env \
              || echo 'STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}' >> /home/ubuntu/Julayorg/backend/.env
            grep -q '^STRIPE_WEBHOOK_SECRET=' /home/ubuntu/Julayorg/backend/.env \
              && sed -i 's|^STRIPE_WEBHOOK_SECRET=.*|STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}|' /home/ubuntu/Julayorg/backend/.env \
              || echo 'STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}' >> /home/ubuntu/Julayorg/backend/.env
            pm2 restart julay-backend
          ENDSSH

      - name: Upload frontend dist via tar+SSH
        run: |
          tar -czf /tmp/frontend.tar.gz -C frontend/dist .
          scp -i ~/.ssh/deploy_key /tmp/frontend.tar.gz ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/frontend.tar.gz
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} bash << 'ENDSSH'
            set -e
            echo "=== Deploying to /home/ubuntu/Julayorg/frontend/dist (ACTUAL nginx root) ==="
            rm -rf /home/ubuntu/Julayorg/frontend/dist
            mkdir -p /home/ubuntu/Julayorg/frontend/dist
            tar -xzf /tmp/frontend.tar.gz -C /home/ubuntu/Julayorg/frontend/dist/
            echo "=== Also deploying to /var/www/julay/frontend/dist ==="
            sudo mkdir -p /var/www/julay/frontend/dist
            sudo chown ubuntu:ubuntu /var/www/julay/frontend/dist
            rm -rf /var/www/julay/frontend/dist/*
            tar -xzf /tmp/frontend.tar.gz -C /var/www/julay/frontend/dist/
            rm /tmp/frontend.tar.gz
            echo "=== VERIFY ==="
            ls /home/ubuntu/Julayorg/frontend/dist/
          ENDSSH

      - name: Reload nginx & diagnose
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} bash << 'ENDSSH'
            echo "=== DISK SPACE ==="
            df -h /

            echo "=== FILES IN DIST ==="
            ls -la /var/www/julay/frontend/dist/ 2>&1 || echo "DIST DIR NOT FOUND"

            echo "=== INDEX.HTML BUNDLE REF ==="
            grep -o 'index-[^"]*\.js' /var/www/julay/frontend/dist/index.html 2>&1 || echo "NO INDEX.HTML"

            echo "=== NGINX SITES-ENABLED ==="
            ls -la /etc/nginx/sites-enabled/ 2>&1

            echo "=== NGINX ROOT CONFIG ==="
            grep -r "root " /etc/nginx/sites-enabled/ 2>&1 || echo "NO ROOT DIRECTIVE"

            echo "=== APPLYING NGINX CONFIG ==="
            sudo cp /home/ubuntu/Julayorg/nginx.conf /etc/nginx/sites-available/julay.org
            sudo ln -sf /etc/nginx/sites-available/julay.org /etc/nginx/sites-enabled/julay.org
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t && sudo systemctl reload nginx && echo "NGINX RELOADED OK"
          ENDSSH
