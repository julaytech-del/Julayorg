name: Deploy to julay.org

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_GOOGLE_CLIENT_ID: 722079093063-prb89vbbksnhhrgsi1q785atmgs6hhac.apps.googleusercontent.com
          VITE_PLAUSIBLE_DOMAIN: julay.org
          VITE_SENTRY_DSN: https://f89dc5462cfea4330b27e4357384cbdb@o4511212808175616.ingest.us.sentry.io/4511212814401536
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare server directories and backend
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            sudo mkdir -p /var/www/julay/frontend/dist &&
            sudo chown -R ubuntu:ubuntu /var/www/julay &&
            cd /home/ubuntu/Julayorg &&
            git pull origin main &&
            cd backend &&
            npm install --production &&
            pm2 restart julay-backend 2>/dev/null || pm2 start /home/ubuntu/Julayorg/backend/src/app.js --name julay-backend --cwd /home/ubuntu/Julayorg/backend &&
            echo 'Backend ready'
          "

      - name: Sync frontend files
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" \
            frontend/dist/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/julay/frontend/dist/

      - name: Apply nginx config
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            sudo cp /home/ubuntu/Julayorg/nginx.conf /etc/nginx/sites-available/julay.org &&
            sudo ln -sf /etc/nginx/sites-available/julay.org /etc/nginx/sites-enabled/julay.org &&
            sudo nginx -t && sudo systemctl reload nginx &&
            echo 'Nginx reloaded'
          "
