name: Deploy to julay.org

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 34.227.78.81 >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          # Copy built frontend to server
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" \
            frontend/dist/ ubuntu@34.227.78.81:/home/ubuntu/Julayorg/frontend/dist/

          # Update backend and restart
          ssh -i ~/.ssh/deploy_key ubuntu@34.227.78.81 "
            cd /home/ubuntu/Julayorg
            git pull origin main
            cd backend && npm install --production
            pm2 restart julay-backend
            echo 'Deploy complete!'
          "
